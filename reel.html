<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading... — Rod2Reel</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root { --gold:#F5A623; --bg:#080808; --surface:#111; --border:#222; --text:#fff; --grey:#666; }
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;text-align:center;}
.loader{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.loader h1{font-family:'Bebas Neue';font-size:28px;color:var(--gold);letter-spacing:2px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%{opacity:0.4;}50%{opacity:1;}100%{opacity:0.4;}}
#main{display:none;padding:60px 20px;}
.biz-name{font-family:'Bebas Neue';font-size:48px;letter-spacing:3px;color:var(--gold);margin-bottom:30px;}
.container{max-width:480px;margin:auto;}
.video-wrap{border-radius:24px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,0.8);margin-bottom:20px;background:#000;border:1px solid var(--border);}
video{width:100%;display:block;}
.btn{width:100%;padding:18px;border-radius:10px;font-weight:bold;font-size:14px;margin-bottom:12px;cursor:pointer;text-decoration:none;color:var(--gold);border:1px solid var(--gold);}
.caption-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin:10px 0 25px;text-align:left;}
.copy-btn{background:rgba(245,166,35,0.1);border:1px solid var(--gold);color:var(--gold);font-size:10px;padding:5px;border-radius:6px;cursor:pointer;}
.biz-logo{max-width:200px;margin:30px auto;display:none;}
</style>
</head>

<body>

<div id="loader" class="loader">
<h1 id="status">Loading...</h1>
</div>

<div id="main">
<div id="bizName" class="biz-name">ROD2REEL</div>

<div class="container">
<div class="video-wrap">
<video id="video" controls playsinline></video>
</div>

<a id="reviewBtn" class="btn" style="display:none;">Leave Review</a>

<div id="captionBox" class="caption-box" style="display:none;">
<button class="copy-btn" onclick="copyText()">Copy Caption</button>
<div id="captionText"></div>
</div>

<button class="btn" onclick="downloadVideo()">Download Video</button>

<img id="shopLogo" class="biz-logo">

</div>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');

const TOKEN = 'YOUR_TOKEN';
const BASE = 'appGGs07d4FB6htwg';
const TABLE = 'tblCYkMaAOHrX0nwN';

async function load() {
if (!id) {
document.getElementById('status').innerText = "Missing ID";
return;
}

try {
const formula = encodeURIComponent(`OR(ARRAYJOIN({lookupId})="${id}", {formId}="${id}")`);

const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

const res = await fetch(url, {
headers: { Authorization: `Bearer ${TOKEN}` }
});

const data = await res.json();

if (!data.records || data.records.length === 0) {
document.getElementById('status').innerText = "No video found";
return;
}

const f = data.records[0].fields;

// HANDLE ARRAYS
let name = f['Charter Name'];
if (Array.isArray(name)) name = name[0];

let review = f['Review'];
if (Array.isArray(review)) review = review[0];

let logo = f['Logo'];
let logoUrl = Array.isArray(logo) ? (logo[0]?.url || logo[0]) : logo;

document.getElementById('bizName').innerText = (name || "ROD2REEL").toUpperCase();
document.getElementById('video').src = f['Video URL'] || "";

if (review) {
document.getElementById('reviewBtn').href = review;
document.getElementById('reviewBtn').style.display = 'block';
}

if (f['Social Post 1']) {
document.getElementById('captionBox').style.display = 'block';
document.getElementById('captionText').innerText = f['Social Post 1'];
}

if (logoUrl) {
document.getElementById('shopLogo').src = logoUrl;
document.getElementById('shopLogo').style.display = 'block';
}

document.getElementById('loader').style.display = 'none';
document.getElementById('main').style.display = 'block';

} catch (e) {
console.error(e);
document.getElementById('status').innerText = "Error loading video";
}
}

function copyText() {
navigator.clipboard.writeText(document.getElementById('captionText').innerText);
alert("Copied!");
}

function downloadVideo() {
let url = document.getElementById('video').src;
if (url.includes('cloudinary')) {
url = url.replace('/upload/', '/upload/fl_attachment/');
}
const a = document.createElement('a');
a.href = url;
a.download = "video.mp4";
a.click();
}

load();
</script>

</body>
</html>
