<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Your Vehicle is Ready 🚗</title>
    <meta property="og:title" content="Your Vehicle is Ready 🚗">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #F5A623;
            --blue: #007AFF; /* Electric Blue for the Download Button */
            --bg: #080808;
            --surface: #111;
            --border: #222;
            --text: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* LOADER */
        .loader {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader h1 {
            font-family: 'Bebas Neue';
            font-size: 28px;
            color: var(--gold);
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        #main {
            display: none;
            animation: appleFade 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes appleFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            padding: 60px 20px 30px;
            border-bottom: 1px solid var(--border);
        }

        .biz-name {
            font-family: 'Bebas Neue';
            font-size: 48px;
            letter-spacing: 3px;
            color: var(--gold);
        }

        .container {
            max-width: 480px;
            margin: auto;
            padding: 20px;
        }

        .video-wrap {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            margin-bottom: 30px;
            background: #000;
            border: 1px solid var(--border);
        }

        video { width: 100%; display: block; }

        .btn {
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
        }

        .btn:active { transform: scale(0.96); }

        /* PRIMARY REVIEW BUTTON (GOLD) */
        .btn-primary { 
            background: var(--gold); 
            color: #000; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        /* DOWNLOAD BUTTON (BLUE) */
        .btn-blue { 
            background: var(--blue); 
            color: #fff; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }

        .footer {
            margin-top: 50px;
            padding-bottom: 60px;
            border-top: 1px solid var(--border);
            padding-top: 30px;
        }

        .footer-main { font-size: 11px; letter-spacing: 2px; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        .footer-sub { font-size: 12px; color: #666; margin: 3px 0; display: block; }
    </style>
</head>

<body>

<div id="loader" class="loader">
    <h1>Preparing Your Delivery...</h1>
</div>

<div id="main">
    <div class="header">
        <div id="bizName" class="biz-name">XTERNAL SHINE</div>
    </div>

    <div class="container">
        <div class="video-wrap">
            <video id="video" controls playsinline></video>
        </div>

        <a id="reviewBtn" href="https://xternalshine.co.za/" class="btn btn-primary">⭐ LEAVE US A REVIEW</a>
        
        <button class="btn btn-blue" onclick="download()">⬇ DOWNLOAD VIDEO</button>

        <div class="footer">
            <div class="footer-main">POWERED BY ROD2REEL</div>
            <div class="footer-sub">hello@rod2reel.com</div>
            <div class="footer-sub">+27 (0)68 364 4061</div>
        </div>
    </div>
</div>

<script>
    const id = new URLSearchParams(window.location.search).get('id');

    const TOKEN = 'patZyvJl4u5MSDTgW.975f3c860d8c4cf7727459583099472585b6656d13e2529a578212eb54c6e4e9';
    const BASE = 'appGGs07d4FB6htwg';
    const TABLE = 'tblCYkMaAOHrX0nwN';

    async function load() {
        try {
            const formula = encodeURIComponent(`{formId}="${id}"`);
            const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

            const res = await fetch(url, {
                headers: { Authorization: `Bearer ${TOKEN}` },
                cache: "no-store"
            });

            const data = await res.json();

            if (!data.records || data.records.length === 0) {
                throw new Error("Delivery not found");
            }

            const f = data.records[0].fields;

            // 1. Business Name
            if(f['Charter Name']) {
                document.getElementById('bizName').innerText = f['Charter Name'].toUpperCase();
            }
            
            // 2. Video Source
            document.getElementById('video').src = f['Video URL'];

            // 3. Review Link
            if (f['Review']) {
                document.getElementById('reviewBtn').href = f['Review'];
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('main').style.display = 'block';

        } catch(e) {
            console.error(e);
        }
    }

    function download() {
        let u = document.getElementById('video').src;
        if(u.includes('cloudinary')) u = u.replace('/upload/','/upload/fl_attachment/');
        const a = document.createElement('a');
        a.href = u;
        a.download = "XternalShine_Video.mp4";
        a.click();
    }

    if(id) load();
</script>

</body>
</html>
