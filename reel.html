<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Delivery Video — Rod2Reel</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root { --gold:#F5A623; --bg:#080808; --border:#222; --text:#fff; }

body { background:var(--bg); color:var(--text); font-family:'DM Sans'; text-align:center; margin:0; }

.loader-wrap { height:85vh; display:flex; align-items:center; justify-content:center; flex-direction:column; }

.loader-text { font-family:'Bebas Neue'; font-size:28px; color:var(--gold); }

#mainContent { display:none; }

.header { padding:40px 20px; border-bottom:1px solid var(--border); }

.biz-name { font-family:'Bebas Neue'; font-size:42px; color:var(--gold); }

.content { max-width:480px; margin:auto; padding:20px; }

.video-wrap { border-radius:20px; overflow:hidden; margin-bottom:20px; box-shadow:0 20px 50px rgba(0,0,0,0.6); }

video { width:100%; display:block; }

.btn { width:100%; padding:18px; margin-bottom:10px; border-radius:12px; cursor:pointer; font-weight:700; }

.btn-watch { background:var(--gold); color:#000; }

.btn-download { background:#111; color:#fff; border:1px solid #333; }

.logo-section img { max-width:260px; margin-top:25px; }

.debug { color:red; font-size:12px; margin-top:15px; }
</style>
</head>

<body>

<div id="loading" class="loader-wrap">
    <div id="statusLabel" class="loader-text">LOADING...</div>
    <div id="debug" class="debug"></div>
</div>

<div id="mainContent">
    <div class="header">
        <div id="bizName" class="biz-name"></div>
    </div>

    <div class="content">
        <div class="video-wrap">
            <video id="mainVideo" controls playsinline></video>
        </div>

        <button class="btn btn-watch" onclick="mainVideo.play()">WATCH VIDEO</button>
        <button class="btn btn-download" onclick="download()">DOWNLOAD VIDEO</button>

        <div class="logo-section">
            <img id="logo">
        </div>
    </div>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');

const TOKEN = 'YOUR_AIRTABLE_TOKEN_HERE';
const BASE = 'appGGs07d4FB6htwg';
const TABLE = 'tblTZuhuvhLxsfI18';

async function load() {
    try {
        const formula = encodeURIComponent(`{lookupId}="${id}"`);
        const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

        const res = await fetch(url, {
            headers: { Authorization: `Bearer ${TOKEN}` },
            cache: "no-store"
        });

        const data = await res.json();

        if (!data.records || data.records.length === 0) {
            throw new Error("No record found for this ID");
        }

        const f = data.records[0].fields;

        document.getElementById('bizName').innerText = (f['Charter Name'] || '').toUpperCase();
        document.getElementById('mainVideo').src = f['Video URL'];

        if (f['Logo URL']) {
            document.getElementById('logo').src = f['Logo URL'];
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

    } catch (e) {
        document.getElementById('statusLabel').innerText = "VIDEO NOT FOUND";
        document.getElementById('debug').innerText = e.message + " | ID: " + id;
    }
}

if (id) load();
else document.getElementById('statusLabel').innerText = "NO ID PROVIDED";

function download(){
    let u = document.getElementById('mainVideo').src;
    if(u.includes('cloudinary')) u = u.replace('/upload/','/upload/fl_attachment/');
    const a = document.createElement('a');
    a.href = u;
    a.download = "video.mp4";
    a.click();
}
</script>

</body>
</html>
