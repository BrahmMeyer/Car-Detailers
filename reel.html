<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Delivery — Rod2Reel</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --gold:#F5A623;
    --bg:#080808;
    --surface:#111;
    --border:#222;
    --text:#fff;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans', sans-serif;
    text-align:center;
}

/* LOADER */
.loader {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.loader h1 {
    font-family:'Bebas Neue';
    font-size:28px;
    color:var(--gold);
    letter-spacing:2px;
    margin-bottom:10px;
}

.loader p {
    font-size:12px;
    color:#777;
}

/* MAIN CONTENT */
#main {
    display:none;
    animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn {
    from { opacity:0; transform:translateY(10px); }
    to { opacity:1; transform:translateY(0); }
}

/* HEADER */
.header {
    padding:50px 20px 25px;
    border-bottom:1px solid var(--border);
}

.biz-name {
    font-family:'Bebas Neue';
    font-size:46px;
    letter-spacing:3px;
    color:var(--gold);
}

/* VIDEO */
.container {
    max-width:480px;
    margin:auto;
    padding:20px;
}

.video-wrap {
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 25px 60px rgba(0,0,0,0.7);
    margin-bottom:25px;
    background:#000;
}

video {
    width:100%;
    display:block;
}

/* BUTTONS */
.btn {
    width:100%;
    padding:18px;
    border-radius:14px;
    font-weight:700;
    font-size:15px;
    margin-bottom:12px;
    cursor:pointer;
    border:none;
    transition:0.2s;
}

.btn-primary {
    background:var(--gold);
    color:#000;
}

.btn-primary:active { transform:scale(0.97); }

.btn-secondary {
    background:transparent;
    color:#fff;
    border:1px solid #333;
}

/* CAPTION */
.caption-box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    margin:20px 0;
    text-align:left;
}

.caption-title {
    font-size:11px;
    letter-spacing:2px;
    color:var(--gold);
    margin-bottom:10px;
}

.caption-text {
    font-size:14px;
    color:#ddd;
    line-height:1.5;
}

/* LOGO */
.logo img {
    max-width:260px;
    margin-top:30px;
    opacity:0.95;
}

/* ERROR */
.error {
    color:red;
    font-size:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader" class="loader">
    <h1>Preparing Your Delivery...</h1>
    <p id="debug"></p>
</div>

<!-- MAIN -->
<div id="main">

    <div class="header">
        <div id="bizName" class="biz-name"></div>
    </div>

    <div class="container">

        <div class="video-wrap">
            <video id="video" controls playsinline></video>
        </div>

        <button class="btn btn-primary" onclick="video.play()">▶ PLAY VIDEO</button>
        <button class="btn btn-secondary" onclick="download()">⬇ DOWNLOAD</button>

        <div id="captionBox" class="caption-box" style="display:none;">
            <div class="caption-title">READY TO POST</div>
            <div id="captionText" class="caption-text"></div>
        </div>

        <div class="logo">
            <img id="logo">
        </div>

    </div>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');

const TOKEN = 'YOUR_AIRTABLE_TOKEN_HERE';
const BASE = 'appGGs07d4FB6htwg';
const TABLE = 'tblCYkMaAOHrX0nwN';

async function load() {
    try {
        const formula = encodeURIComponent(`{formId}="${id}"`);
        const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

        const res = await fetch(url, {
            headers: { Authorization: `Bearer ${TOKEN}` },
            cache: "no-store"
        });

        const data = await res.json();

        if (!data.records.length) throw new Error("No record found");

        const f = data.records[0].fields;

        bizName.innerText = (f['Charter Name'] || '').toUpperCase();
        video.src = f['Video URL'];

        if (f['Logo']) logo.src = f['Logo'];

        if (f['Social Post 1']) {
            captionBox.style.display = 'block';
            captionText.innerText = f['Social Post 1'];
        }

        loader.style.display = 'none';
        main.style.display = 'block';

    } catch(e) {
        debug.innerText = "Error: " + e.message + " | ID: " + id;
    }
}

function download() {
    let u = video.src;
    if(u.includes('cloudinary')) u = u.replace('/upload/','/upload/fl_attachment/');
    const a = document.createElement('a');
    a.href = u;
    a.download = "video.mp4";
    a.click();
}

if(id) load();
else debug.innerText = "Missing ID";
</script>

</body>
</html>
