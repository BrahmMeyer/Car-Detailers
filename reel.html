<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Your Reel is Ready</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root { --gold:#F5A623; --bg:#080808; --surface:#111; --border:#222; --text:#fff; --grey:#666; }
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;text-align:center;}
#loader{height:100vh;display:flex;justify-content:center;align-items:center;color:var(--gold);}
#main{display:none;padding:60px 20px;}
.biz-name{font-family:'Bebas Neue'; font-size:48px; color:var(--gold); margin-bottom:30px; letter-spacing:2px;}
.container{max-width:480px; margin:auto;}
.video-wrap{border-radius:24px; overflow:hidden; border:1px solid var(--border); margin-bottom:25px; background:#000;}
video{width:100%; display:block;}
.btn{width:100%; padding:16px; border-radius:10px; font-weight:bold; font-size:14px; margin-bottom:15px; cursor:pointer; text-decoration:none; display:inline-block; border:2px solid var(--gold); text-transform:uppercase; letter-spacing:1.5px; background:transparent; color:var(--gold); transition: 0.3s;}
.btn:hover{background:rgba(245, 166, 35, 0.1);}
.btn-hero { background: var(--gold); color: #000; border: none; }
.btn-hero:hover { background: #e0961f; color: #000; }
.thank-you-box{background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:25px; margin-bottom:25px; text-align:center;}
#captionText{font-size: 15px; color: #bbb; line-height: 1.6;}
.caption-label { color: var(--gold); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 600; }
.copy-btn { margin: 15px auto 0; padding: 10px 20px; font-size: 12px; border-radius: 8px; border: 1px solid #444; background: transparent; color: #bbb; cursor: pointer; display: block; transition: 0.3s; }
.copy-btn:hover { background: rgba(255, 255, 255, 0.05); border-color: #666; color: var(--gold); }

/* FOOTER LOGO & CLEANUP */
.footer { margin-top: 10px; padding-top: 0; border-top: none; } /* Removed thin grey line */
#bizLogo { max-height: 135px; width: auto; margin: 30px auto 10px; display: none; } /* 35% Bigger */
.footer-main { font-size: 12px; color: var(--grey); letter-spacing: 3px; font-weight: bold; text-transform: uppercase; }
</style>
</head>
<body>

<div id="loader"><h1>LOADING EXPERIENCE...</h1></div>

<div id="main">
    <div id="bizName" class="biz-name">ROD2REEL</div>

    <div class="container">
        <div class="video-wrap">
            <video id="video" controls playsinline></video>
        </div>

        <a id="reviewBtn" class="btn" style="display:none;">Leave Us A Review</a>

        <div id="thankYouBox" class="thank-you-box" style="display:none;">
            <div class="caption-label">Social Media Caption</div>
            <div id="captionText"></div>
            <button class="copy-btn" onclick="copyCaption()">📋 Copy Caption</button>
        </div>

        <button class="btn" onclick="downloadVideo()">Download Video</button>

        <button id="saveBtn" class="btn btn-hero" onclick="shareExperience()">Save to my Phone</button>

        <img id="bizLogo" alt="Business Logo">

        <div class="footer">
            <div class="footer-main">POWERED BY ROD2REEL</div>
        </div>
    </div>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');
const TOKEN = 'patODjpFQhnsR92tl.5c80e0baa73a4b2099a83fead58c6cf8ac9811041b7077f031f95d5db82e8430';
const BASE = 'appGGs07d4FB6htwg';
const TABLE = 'tblCYkMaAOHrX0nwN';

let globalBizName = "ROD2REEL";

async function load() {
    if (!id) return;
    try {
        const formula = encodeURIComponent(`OR(FIND("${id}", ARRAYJOIN({lookupId})), {formId}="${id}", {Video ID}="${id}")`);
        const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}&sort[0][field]=Created&sort[0][direction]=desc`;
        
        const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const data = await res.json();

        if (!data.records || data.records.length === 0) return;

        const f = data.records[0].fields;
        
        // Map Business Name
        let name = f['Charter Name']; if (Array.isArray(name)) name = name[0];
        globalBizName = name || "ROD2REEL";
        document.getElementById('bizName').innerText = globalBizName.toUpperCase();
        
        // Map Video
        document.getElementById('video').src = (f['Video URL'] || "") + "?t=" + new Date().getTime();

        // LOGO LOGIC (Mapped to 'Logo' field)
        const logoData = f['Logo'];
        let finalLogoUrl = "";
        if (Array.isArray(logoData)) {
            finalLogoUrl = logoData[0].url || logoData[0]; 
        } else {
            finalLogoUrl = logoData;
        }

        if (finalLogoUrl) {
            const logoImg = document.getElementById('bizLogo');
            logoImg.src = finalLogoUrl;
            logoImg.onload = () => { logoImg.style.display = 'block'; };
        }

        // Review Button
        let review = f['Review']; if (Array.isArray(review)) review = review[0];
        if (review) {
            document.getElementById('reviewBtn').href = review;
            document.getElementById('reviewBtn').style.display = 'block';
        }

        // Caption Box
        if (f['Social Post 1']) {
            document.getElementById('thankYouBox').style.display = 'block';
            document.getElementById('captionText').innerText = f['Social Post 1'];
        }

        document.getElementById('loader').style.display = 'none';
        document.getElementById('main').style.display = 'block';

    } catch (e) { console.error(e); }
}

async function shareExperience() {
    const shareData = {
        title: `Your ${globalBizName} Experience`,
        text: `Check out the highlight of the drive! Here is the link to your video:`,
        url: window.location.href
    };
    try {
        if (navigator.share) {
            await navigator.share(shareData);
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied to clipboard!");
        }
    } catch (err) { console.log('Share failed:', err); }
}

function downloadVideo() { 
    let url = document.getElementById('video').src.split('?')[0];
    if (url && url.includes('cloudinary')) url = url.replace('/upload/', '/upload/fl_attachment/');
    if(url){
        const a = document.createElement('a');
        a.href = url;
        a.download = "reel.mp4";
        a.click();
    }
}

function copyCaption() {
    const text = document.getElementById('captionText').innerText;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.innerText = "✓ Copied";
        setTimeout(() => { btn.innerText = "📋 Copy Caption"; }, 2000);
    });
}

load();
</script>
</body>
</html>
