<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Delivery Video — Rod2Reel</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #F5A623; --bg: #080808; --surface: #111111; --border: #222222; --text: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); text-align: center; padding-bottom: 60px; overflow-x: hidden; }
        .loader-wrap { height: 85vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-text { font-family: 'Bebas Neue'; font-size: 28px; color: var(--gold); letter-spacing: 4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        #mainContent { display: none; animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .header { padding: 40px 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .biz-name { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 3px; color: var(--gold); line-height: 1.1; }
        .content { max-width: 480px; margin: 0 auto; padding: 0 20px; }
        .video-wrap { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); background: #000; line-height: 0; }
        video { width: 100%; display: block; border-radius: 18px; }
        .btn { display: block; width: 100%; padding: 22px; border-radius: 16px; font-weight: 800; text-decoration: none; margin-bottom: 15px; font-size: 16px; border: none; cursor: pointer; transition: all 0.2s ease; }
        .btn:active { transform: scale(0.96); }
        .btn-watch { background: var(--gold); color: #000; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 10px 25px rgba(245,166,35,0.25); }
        .btn-download { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid #333; }
        .logo-section { padding: 40px 20px; margin-top: 20px; }
        .logo-section img { width: 100%; max-width: 260px; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
        .error-msg { color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="loading" class="loader-wrap">
        <div class="loader-text" id="statusLabel">PREPARING YOUR REEL...</div>
    </div>

    <div id="mainContent">
        <div class="header"><div class="biz-name" id="bizName">LOADING...</div></div>
        <div class="content">
            <div class="video-wrap"><video id="mainVideo" controls playsinline></video></div>
            <button class="btn btn-watch" onclick="document.getElementById('mainVideo').play()">🎬 WATCH MY VIDEO</button>
            <button class="btn btn-download" onclick="handleDownload()">⬇️ DOWNLOAD VIDEO</button>
            <div class="logo-section"><img id="bizLogo" src="" alt="Logo"></div>
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const recordId = p.get('id');

        // YOUR ACTUAL TABLE DETAILS
        const AIRTABLE_TOKEN = 'patj2fjhAMYzbPIvg';
        const BASE_ID = 'appGGs07d4FB6htwg';
        const TABLE_NAME = 'tblCYkMaAOHrX0nwN'; // YOUR DELIVERIES TABLE

        async function fetchDelivery() {
            try {
                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${recordId}`, {
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
                });
                
                if (!response.ok) throw new Error();

                const data = await response.json();
                const f = data.fields;

                // Match column names exactly from your "Deliveries" table
                const videoUrl = f['Video URL'];
                const logoUrl = f['Logo']; // Verifying from CSV this is the column name
                const bizName = f['Charter Name'];

                if (!videoUrl) {
                    document.getElementById('statusLabel').innerHTML = "VIDEO NOT READY<br><span class='error-msg'>URL is missing in Airtable</span>";
                    return;
                }

                document.getElementById('bizName').innerText = (bizName || 'ROD2REEL').toUpperCase();
                document.getElementById('mainVideo').src = videoUrl;
                
                if (logoUrl) {
                    // Handle both URL strings and Airtable attachment arrays
                    document.getElementById('bizLogo').src = Array.isArray(logoUrl) ? logoUrl[0].url : logoUrl;
                } else {
                    document.getElementById('bizLogo').style.display = 'none';
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';

            } catch (err) {
                document.getElementById('statusLabel').innerHTML = "VIDEO NOT FOUND<br><span class='error-msg'>Check your Record ID</span>";
            }
        }

        if (recordId) fetchDelivery();
        else document.getElementById('statusLabel').innerText = "NO ID PROVIDED";

        function handleDownload() {
            let u = document.getElementById('mainVideo').src;
            if (u.includes('cloudinary.com')) u = u.replace('/upload/', '/upload/fl_attachment/');
            const a = document.createElement('a'); a.href = u; a.download = 'MyVideo.mp4'; a.click();
        }
    </script>
</body>
</html>
