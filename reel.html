<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Delivery Video — Rod2Reel</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #F5A623; --bg: #080808; --surface: #111111; --border: #222222; --text: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); text-align: center; padding-bottom: 60px; }
        
        /* LOADING STATE */
        .loader-wrap { height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-text { font-family: 'Bebas Neue'; font-size: 28px; color: var(--gold); letter-spacing: 4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        #mainContent { display: none; }
        .header { padding: 50px 20px 30px; border-bottom: 1px solid var(--border); }
        .biz-name { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 3px; color: var(--gold); line-height: 1; }
        .content { max-width: 480px; margin: 0 auto; padding: 20px; }
        .video-wrap { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); background: #000; }
        video { width: 100%; display: block; }
        .btn { display: block; width: 100%; padding: 20px; border-radius: 14px; font-weight: 800; text-decoration: none; margin-bottom: 15px; font-size: 16px; border: none; cursor: pointer; }
        .btn-review { background: var(--gold); color: #000; }
        .btn-download { background: transparent; color: #fff; border: 1px solid #444; }
        .logo-section { padding: 50px 20px; }
        .logo-section img { width: 100%; max-width: 380px; height: auto; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
    </style>
</head>
<body>
    <div id="loading" class="loader-wrap">
        <div class="loader-text">PREPARING YOUR REEL...</div>
    </div>

    <div id="mainContent">
        <div class="header"><div class="biz-name" id="bizName"></div></div>
        <div class="content">
            <div class="video-wrap"><video id="mainVideo" controls playsinline></video></div>
            <a id="reviewLink" href="#" class="btn btn-review" target="_blank" style="display:none;">⭐ LEAVE A REVIEW</a>
            <button class="btn btn-download" onclick="handleDownload()">⬇️ DOWNLOAD VIDEO</button>
            <div class="logo-section"><img id="bizLogo" src=""></div>
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const recordId = p.get('id');

        // YOUR PRIVATE CONFIG
        const AIRTABLE_TOKEN = 'patj2fjhAMYzbPIvg';
        const BASE_ID = 'appGGs07d4FB6htwg';
        const TABLE_NAME = 'tblCYkMaAOHrX0nwN';

        async function fetchDelivery() {
            try {
                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${recordId}`, {
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
                });
                const data = await response.json();
                const f = data.fields;

                // Load Data into UI
                document.getElementById('bizName').innerText = (f['Charter Name'] || 'ROD2REEL').toUpperCase();
                document.getElementById('mainVideo').src = f['Video URL'];
                document.getElementById('bizLogo').src = f['Logo'] || '';
                
                if(f['GMB Review Link']) {
                    document.getElementById('reviewLink').href = f['GMB Review Link'];
                    document.getElementById('reviewLink').style.display = 'block';
                }

                // Show Content
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } catch (err) {
                document.getElementById('loading').innerHTML = '<div class="loader-text">VIDEO NOT FOUND</div>';
            }
        }

        if (recordId) { fetchDelivery(); }

        function handleDownload() {
            let u = document.getElementById('mainVideo').src;
            if (!u.includes('fl_attachment')) u = u.replace('/upload/', '/upload/fl_attachment/');
            const a = document.createElement('a'); a.href = u; a.download = 'Cinematic_Reel.mp4'; a.click();
        }
    </script>
</body>
</html>
