<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Delivery Video — Wheels2Reels</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #F5A623; --bg: #080808; --surface: #111111; --border: #222222; --text: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); padding-bottom: 60px; text-align: center; }
        
        .header { padding: 50px 20px 30px; border-bottom: 1px solid var(--border); }
        .biz-name { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 3px; color: var(--gold); line-height: 1; }
        
        .content { max-width: 480px; margin: 0 auto; padding: 20px; }
        .video-wrap { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); background: #000; }
        video { width: 100%; display: block; }
        
        .btn { display: block; width: 100%; padding: 20px; border-radius: 14px; font-weight: 800; text-decoration: none; margin-bottom: 15px; font-size: 16px; border: none; cursor: pointer; }
        .btn-review { background: var(--gold); color: #000; }
        .btn-download { background: transparent; color: #fff; border: 1px solid #444; }

        /* SUGGESTED CAPTION SECTION */
        .social-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 24px; text-align: left; }
        .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
        .post-card { background: #1a1a1a; border-radius: 10px; padding: 15px; cursor: pointer; }
        .post-text { font-size: 14px; color: #ddd; line-height: 1.5; }

        /* 2X LOGO SIZE */
        .logo-section { padding: 50px 20px; }
        .logo-section img { width: 100%; max-width: 380px; height: auto; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
    </style>
</head>
<body>
    <div class="header"><div class="biz-name" id="bizName">LOADING...</div></div>
    <div class="content">
        <div class="video-wrap"><video id="mainVideo" controls playsinline></video></div>
        
        <div class="social-section" id="socialSection" style="display:none;">
            <div class="section-label">Copy for your Instagram:</div>
            <div class="post-card" onclick="copyText()">
                <div class="post-text" id="postText"></div>
                <div style="font-size:10px; color:var(--gold); margin-top:10px; text-align:right;">TAP TO COPY 📋</div>
            </div>
        </div>

        <a id="reviewLink" href="#" class="btn btn-review" target="_blank" style="display:none;">⭐ LEAVE A REVIEW</a>
        <button class="btn btn-download" onclick="handleDownload()">⬇️ DOWNLOAD VIDEO</button>
        
        <div class="logo-section"><img id="bizLogo" src=""></div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        document.getElementById('bizName').innerText = (p.get('name') || 'WHEELS2REELS').toUpperCase();
        document.getElementById('mainVideo').src = p.get('video')?.replace('fl_attachment/', '') || '';
        document.getElementById('bizLogo').src = p.get('logo') || '';
        
        if(p.get('caption')) {
            document.getElementById('socialSection').style.display = 'block';
            document.getElementById('postText').innerText = decodeURIComponent(p.get('caption'));
        }
        if(p.get('review')) {
            document.getElementById('reviewLink').href = p.get('review');
            document.getElementById('reviewLink').style.display = 'block';
        }

        function copyText() {
            const t = document.getElementById('postText').innerText;
            navigator.clipboard.writeText(t).then(() => alert('Caption copied!'));
        }

        function handleDownload() {
            let u = p.get('video');
            if (!u.includes('fl_attachment')) u = u.replace('/upload/', '/upload/fl_attachment/');
            const a = document.createElement('a'); a.href = u; a.download = 'Cinematic_Reel.mp4'; a.click();
        }
    </script>
</body>
</html>
