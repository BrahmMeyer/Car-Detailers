<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Dispatch — Rod2Reel</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #F5A623; --bg: #080808; --surface: #111111; --border: #222222; --text: #FFFFFF; --green: #25D366; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .card { background: var(--surface); padding: 35px 30px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        h2 { color: var(--gold); margin-bottom: 12px; font-size: 24px; letter-spacing: 1px; }
        input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #333; background: #1a1a1a; color: var(--text); font-size: 20px; margin-bottom: 20px; outline: none; text-align: center; }
        .btn-send { background: linear-gradient(135deg, #25D366, #1DA851); color: white; padding: 20px; border-radius: 14px; font-weight: bold; display: block; font-size: 16px; border: none; cursor: pointer; width: 100%; }
        .footer-logo { margin-top: 30px; color: var(--gold); font-size: 11px; letter-spacing: 1.5px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <h2>WhatsApp Dispatch</h2>
    <p style="color:#666; font-size:14px; margin-bottom:20px;">Enter client number to send their reel.</p>
    <input type="tel" id="phone" placeholder="082 123 4567" autocomplete="off">
    <button type="button" id="sendBtn" onclick="sendToWhatsApp()" class="btn-send">🚀 OPEN IN WHATSAPP</button>
</div>

<div class="footer-logo">POWERED BY ROD2REEL</div>

<script>
    function sendToWhatsApp() {
        const urlParams = new URLSearchParams(window.location.search);
        const recordId = urlParams.get('id'); // Get ID from Make.com

        let phone = document.getElementById('phone').value.replace(/\D/g, '');
        if (phone.startsWith('0')) { phone = '27' + phone.substring(1); }

        if (phone.length < 10) { alert("Invalid Number"); return; }

        // THE NEW CLEAN LINK
        const reelLink = `https://delivery.rod2reel.com/reel.html?id=${recordId}`;

        // THE PERSONALIZED MESSAGE WITH YOUR SENTENCE
        const message = `Job done watch your Video here 🚗\n${reelLink}`;

        window.location.assign(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
    }
</script>
</body>
</html>
