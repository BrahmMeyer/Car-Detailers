<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Video</title>

<style>
body{background:#080808;color:#fff;font-family:sans-serif;text-align:center;padding:40px;}
input{padding:12px;width:100%;max-width:300px;margin-bottom:15px;}
button{padding:12px;width:100%;max-width:300px;margin:5px;}
</style>
</head>

<body>

<h2 id="title">Loading...</h2>

<input id="input" placeholder="Phone or Email">

<button onclick="send('whatsapp')">WhatsApp</button>
<button onclick="send('sms')">SMS</button>
<button onclick="send('email')">Email</button>

<script>
const id = new URLSearchParams(window.location.search).get('id');

const TOKEN = 'YOUR_TOKEN';
const BASE = 'appGGs07d4FB6htwg';
const TABLE = 'tblCYkMaAOHrX0nwN';

async function load() {
try {
const formula = encodeURIComponent(`OR(ARRAYJOIN({lookupId})="${id}", {formId}="${id}")`);
const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

const res = await fetch(url, {
headers: { Authorization: `Bearer ${TOKEN}` }
});

const data = await res.json();

if (data.records.length > 0) {
let name = data.records[0].fields['Charter Name'];
if (Array.isArray(name)) name = name[0];

document.getElementById('title').innerText = name || "Send Video";
}

} catch(e) {}
}

function send(type) {
const val = document.getElementById('input').value;
const link = `https://delivery.rod2reel.com/reel.html?id=${id}`;
const msg = `View your video: ${link}`;

if (type === 'whatsapp') {
window.location.href = `https://wa.me/${val}?text=${encodeURIComponent(msg)}`;
}
if (type === 'sms') {
window.location.href = `sms:${val}?body=${encodeURIComponent(msg)}`;
}
if (type === 'email') {
window.location.href = `mailto:${val}?subject=Your Video&body=${encodeURIComponent(msg)}`;
}
}

load();
</script>

</body>
</html>
