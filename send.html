<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Experience — Rod2Reel</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #F5A623; --bg: #080808; --surface: #111111; --border: #222222; --text: #FFFFFF; --gray: #666666; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; text-align: center; }
        h2 { color: var(--gold); letter-spacing: 1px; margin-bottom: 5px; }
        .video-wrapper { width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; background: #000; }
        video { width: 100%; display: block; }
        .caption-box { background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); color: #aaa; font-size: 14px; margin-bottom: 20px; text-align: left; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; margin-bottom: 10px; transition: 0.2s; border: none; }
        .btn-download { background: var(--gold); color: #000; }
        .btn-review { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); width: 100%; color: var(--gray); font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="display-name">Your Experience</h2>
    <p style="color:#666; margin-bottom:20px;">Powered by Rod2Reel</p>

    <div class="video-wrapper">
        <video id="main-video" controls playsinline>
            <source src="" type="video/mp4">
        </video>
    </div>

    <div class="caption-box" id="caption-text">
        Loading captions...
    </div>

    <a id="download-link" href="#" download="My_Experience.mp4" class="btn btn-download">DOWNLOAD HD REEL</a>
    <a href="https://g.page/r/YOUR_REVIEW_LINK/review" class="btn btn-review">LEAVE A REVIEW</a>

    <div class="footer">
        <strong>ROD2REEL AUTOMATION</strong><br>
        hello@rod2reel.com | +1 (573) 533-3433
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('video'); // From Cloudinary
    const name = urlParams.get('name') || "Your Experience";
    const captions = urlParams.get('caps') || "Check out this incredible footage from today's trip!";

    // Update Page Content
    if(videoUrl) {
        document.getElementById('main-video').src = videoUrl;
        document.getElementById('download-link').href = videoUrl;
    }
    document.getElementById('display-name').innerText = name;
    document.getElementById('caption-text').innerText = captions;
</script>
</body>
</html>
