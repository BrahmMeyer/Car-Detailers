<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Video — Wheels2Reels</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #080808; color: #fff; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #111; border: 1px solid #222; padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h1 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; color: #F5A623; margin-bottom: 10px; font-size: 32px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        input { width: 100%; background: #1A1A1A; border: 1px solid #333; color: #fff; padding: 18px; border-radius: 10px; font-size: 20px; margin-bottom: 20px; outline: none; text-align: center; box-sizing: border-box; }
        input:focus { border-color: #F5A623; box-shadow: 0 0 10px rgba(245,166,35,0.2); }
        .btn { background: #25D366; color: #fff; border: none; padding: 18px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; transition: all 0.2s; letter-spacing: 1px; }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SEND TO CLIENT</h1>
        <p>Type the client's mobile number below to open a direct WhatsApp chat.</p>
        <input type="tel" id="mobileNumber" placeholder="e.g. 082 123 4567" autofocus>
        <button class="btn" onclick="sendToWhatsApp()">OPEN IN WHATSAPP</button>
    </div>

    <script>
        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name) || '';
        }

        function sendToWhatsApp() {
            let num = document.getElementById('mobileNumber').value.trim();
            // Clean the number (remove spaces, dashes, etc)
            num = num.replace(/\D/g, ''); 
            
            // South African logic: if it starts with 0, replace with 27
            if (num.startsWith('0')) { num = '27' + num.substring(1); }
            
            if (num.length < 10) { alert('Asseblief, voer 'n geldige nommer in.'); return; }

            const video = getParam('video');
            const name = getParam('name') || 'Your Car';
            
            // The final message
            const message = `Hi! Your car is ready for collection. Check out your professional delivery video here: https://brahmmeyer.github.io/Car-Detailers/reel.html?name=${encodeURIComponent(name)}%26video=${video}`;
            
            // Redirect to WhatsApp Direct API
            window.location.href = `https://wa.me/${num}?text=${encodeURIComponent(message)}`;
        }
    </script>
</body>
</html>
