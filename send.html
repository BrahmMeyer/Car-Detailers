<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch Hub — Rod2Reel</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #F5A623; --bg: #080808; --surface: #111111; --border: #222222; --text: #FFFFFF; --grey: #666; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .card { background: var(--surface); padding: 35px 30px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        h2 { color: var(--gold); margin-bottom: 12px; font-size: 24px; letter-spacing: 1px; text-transform: uppercase; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; font-weight: bold; }
        input { width: 100%; padding: 16px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: var(--text); font-size: 16px; margin-bottom: 20px; outline: none; text-align: center; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn-send { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 16px; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; text-decoration: none; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .btn-send:active { transform: scale(0.98); background: rgba(245,166,35,0.05); }
        .footer-logo { margin-top: 30px; color: var(--grey); font-size: 11px; letter-spacing: 1.5px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dispatch Hub</h2>
    <p id="instruction">Loading Charter...</p>
    <input type="text" id="recipient" placeholder="Phone Number or Email" autocomplete="off">
    <div class="btn-group">
        <button onclick="dispatch('whatsapp')" class="btn-send">Send via WhatsApp</button>
        <button onclick="dispatch('sms')" class="btn-send">Send via SMS</button>
        <button onclick="dispatch('email')" class="btn-send">Send via Email</button>
    </div>
</div>

<div class="footer-logo">Powered by Rod2Reel</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const recordId = urlParams.get('id');
    const TOKEN = 'patODjpFQhnsR92tl.5c80e0baa73a4b2099a83fead58c6cf8ac9811041b7077f031f95d5db82e8430';
    const BASE = 'appGGs07d4FB6htwg';
    const TABLE = 'tblCYkMaAOHrX0nwN';

    async function fetchInfo() {
        if (!recordId) return;
        try {
            // FIXED: Added FIND and ARRAYJOIN to handle the lookupId array
            const formula = encodeURIComponent(`OR(FIND("${recordId}", ARRAYJOIN({lookupId})), {formId}="${recordId}")`);
            const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;
            const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
            const data = await res.json();
            if (data.records && data.records.length > 0) {
                const name = data.records[0].fields['Charter Name'] || "Charter";
                document.getElementById('instruction').innerText = `${name} Video`.toUpperCase();
            }
        } catch (e) { document.getElementById('instruction').innerText = "ENTER DETAILS BELOW:"; }
    }

    function dispatch(type) {
        const input = document.getElementById('recipient').value.trim();
        if (!input) { alert("Please enter details."); return; }
        const reelLink = `https://delivery.rod2reel.com/reel.html?id=${recordId}`;
        const message = `View it here:\n${reelLink}`;
        if (type === 'whatsapp') {
            let phone = input.replace(/\D/g, '');
            if (phone.startsWith('0') && phone.length === 10) { phone = '27' + phone.substring(1); }
            window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        } else if (type === 'sms') {
            window.location.href = `sms:${input}?&body=${encodeURIComponent(message)}`;
        } else if (type === 'email') {
            window.location.href = `mailto:${input}?subject=Your Video is Ready&body=${encodeURIComponent(message)}`;
        }
    }
    fetchInfo();
</script>
</body>
</html>
