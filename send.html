<script>
    function getParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    function sendToWhatsApp() {
        let phone = document.getElementById('phone').value.replace(/\s+/g, '');
        
        // Auto-fix for South African numbers
        if (phone.startsWith('0')) {
            phone = '27' + phone.substring(1);
        }
        
        // Clean any non-numeric characters
        phone = phone.replace(/\D/g, '');

        if (phone.length < 9) {
            alert("Please enter a valid phone number");
            return;
        }

        // Get data from URL parameters
        const bizName = getParam('name') || "Your Car";
        const video = getParam('video') || "";
        const logo = getParam('logo') || "";
        const review = getParam('review') || "";
        const caption = getParam('post1') || "Your cinematic delivery video is ready!";

        // CONSTRUCT THE CLEAN CLIENT LINK
        // This link is what WhatsApp uses to generate that nice preview card
        const reelLink = `https://delivery.rod2reel.com/reel.html?name=${encodeURIComponent(bizName)}&video=${encodeURIComponent(video)}&logo=${encodeURIComponent(logo)}&review=${encodeURIComponent(review)}&post1=${encodeURIComponent(caption)}`;

        // THE FINAL MESSAGE (REMOVED REDUNDANT URL AND TEXT)
        // By sending only the link, WhatsApp generates the preview card
        // The business owner can now just type their own message before hitting send.
        const message = `${reelLink}`;

        // OPEN WHATSAPP
        const finalUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        window.location.href = finalUrl;
    }
</script>
