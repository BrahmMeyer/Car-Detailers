<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Dispatch — Rod2Reel</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #F5A623; --bg: #080808; --surface: #111111; --border: #222222; --text: #FFFFFF; --green: #25D366; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .card { background: var(--surface); padding: 35px 30px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        h2 { color: var(--gold); margin-bottom: 12px; font-size: 24px; letter-spacing: 1px; }
        p { color: #bbb; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #333; background: #1a1a1a; color: var(--text); font-size: 20px; margin-bottom: 20px; outline: none; text-align: center; }
        .btn-send { background: linear-gradient(135deg, #25D366, #1DA851); color: white; padding: 20px; border-radius: 14px; font-weight: bold; display: block; font-size: 16px; border: none; cursor: pointer; width: 100%; }
        .footer-logo { margin-top: 30px; color: var(--gold); font-size: 11px; letter-spacing: 1.5px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <h2>WhatsApp Dispatch</h2>
    <p>Enter the client's mobile number below.</p>
    <input type="tel" id="phone" placeholder="082 123 4567" autocomplete="off">
    <button type="button" id="sendBtn" onclick="sendToWhatsApp()" class="btn-send">🚀 OPEN IN WHATSAPP</button>
</div>

<div class="footer-logo">POWERED BY ROD2REEL<br>hello@rod2reel.com</div>

<script>
    function getParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    function sendToWhatsApp() {
        const btn = document.getElementById('sendBtn');
        btn.innerText = "REDIRECTING...";
        btn.style.opacity = "0.5";

        let phoneInput = document.getElementById('phone').value;
        let phone = phoneInput.replace(/\D/g, ''); // Remove all non-digits
        
        if (phone.startsWith('0')) {
            phone = '27' + phone.substring(1);
        }

        if (phone.length < 10) {
            alert("Please enter a valid phone number");
            btn.innerText = "🚀 OPEN IN WHATSAPP";
            btn.style.opacity = "1";
            return;
        }

        const bizName = getParam('name') || "Your Car";
        const video = getParam('video') || "";
        const logo = getParam('logo') || "";
        const review = getParam('review') || "";
        const caption = getParam('post1') || "Your cinematic delivery video is ready!";

        // URL construction
        const reelLink = `https://delivery.rod2reel.com/reel.html?name=${encodeURIComponent(bizName)}&video=${encodeURIComponent(video)}&logo=${encodeURIComponent(logo)}&review=${encodeURIComponent(review)}&post1=${encodeURIComponent(caption)}`;

        // We use just 3 line breaks to keep the script stable while still hiding the URL slightly
        const message = `${reelLink}\n\n\n`;
        const finalUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

        // The "Buffered Delay" to fix the "Nothing Happens" bug
        setTimeout(function() {
            window.location.assign(finalUrl);
        }, 300);
    }
</script>
</body>
</html>
