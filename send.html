<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispatch Hub — Rod2Reel</title>
<style>
:root { --gold: #F5A623; --bg: #080808; --surface: #111111; --border: #222222; --text: #FFFFFF; }
body{background:var(--bg); color:var(--text); font-family:sans-serif; text-align:center; padding:40px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height: 100vh; margin:0;}
.card { background: var(--surface); padding: 30px; border-radius: 20px; border: 1px solid var(--border); width: 100%; max-width: 350px; }
h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-size: 18px; }
input{padding:14px; width:100%; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 15px; box-sizing: border-box; text-align: center; font-size: 16px; outline: none;}
.btn{padding:14px; width:100%; border-radius: 8px; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-weight: bold; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; display: inline-block;}
.btn:active { background: rgba(245,166,35,0.1); }
</style>
</head>
<body>
<div class="card">
    <h2>Dispatch Reel</h2>
    <input id="input" placeholder="Phone or Email" autocomplete="off">
    <button class="btn" onclick="send('whatsapp')">WhatsApp</button>
    <button class="btn" onclick="send('email')">Email</button>
</div>
<script>
const id = new URLSearchParams(window.location.search).get('id');
function send(type) {
    const val = document.getElementById('input').value.trim();
    if(!val) return;
    const link = `https://delivery.rod2reel.com/reel.html?id=${id}`;
    const msg = `Your vehicle transformation is ready! View the reveal here: ${link}`;
    if (type === 'whatsapp') {
        let phone = val.replace(/\D/g, '');
        if (phone.startsWith('0') && phone.length === 10) phone = '27' + phone.substring(1);
        window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    } else if (type === 'email') {
        window.location.href = `mailto:${val}?subject=Your Video&body=${encodeURIComponent(msg)}`;
    }
}
</script>
</body>
</html>
